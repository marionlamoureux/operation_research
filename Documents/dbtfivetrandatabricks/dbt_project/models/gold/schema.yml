version: 2

models:
  - name: claim_leather_audited_ratio
    description: |
      Calculated metric for leather sourcing from audited suppliers.
      This model backs the sustainability claim on the website.
    columns:
      - name: year
        description: Reporting year
        tests:
          - not_null
          - unique
      - name: total_volume_kg
        description: Total leather sourced in kilograms
        tests:
          - not_null
      - name: audited_volume_kg
        description: Leather sourced from audited suppliers in kilograms
        tests:
          - not_null
      - name: audited_ratio
        description: Ratio of audited to total volume (0-1)
        tests:
          - not_null

  - name: sustainability_narrative
    description: |
      Human-readable sustainability claims generated from governed data.
      This table powers the sustainability page content.
    columns:
      - name: brand
        description: Brand name
        tests:
          - not_null
      - name: year
        description: Reporting year
        tests:
          - not_null
          - unique
      - name: leather_claim
        description: Generated narrative claim about leather sourcing
        tests:
          - not_null
