version: 2

models:
  - name: fact_material_sourcing
    description: Core fact table combining procurement orders with supplier audit information
    columns:
      - name: year
        description: Year of procurement
        tests:
          - not_null
      - name: material_type
        description: Type of material (normalized to uppercase)
        tests:
          - not_null
      - name: supplier_id
        description: Supplier identifier
        tests:
          - not_null
      - name: order_id
        description: Unique order identifier
        tests:
          - unique
          - not_null
      - name: volume_kg
        description: Volume in kilograms
        tests:
          - not_null
      - name: is_audited
        description: Whether the supplier was audited for this year
        tests:
          - not_null
