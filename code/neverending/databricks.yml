bundle:
  name: neverending

include:
  - resources/*.yml

variables:
  catalog:
    default: "nef_catalog"
  schema:
    default: "neverending"
  warehouse_id:
    lookup:
      warehouse: "Serverless Starter Warehouse"

targets:
  dev:
    default: true
    mode: development
    workspace:
      profile: DEFAULT
    variables:
      catalog: "nef_catalog"
      schema: "neverending"
