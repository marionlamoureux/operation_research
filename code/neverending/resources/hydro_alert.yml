resources:
  alerts:
    hydro_water_level_alert:
      display_name: "[${bundle.target}] Hydrometrics - High Water Level"
      query_text: |
        SELECT MAX(water_level_cm) AS max_level
        FROM ${var.catalog}.${var.schema}.hydrometrics
        WHERE timestamp >= CURRENT_TIMESTAMP() - INTERVAL 1 HOUR
      warehouse_id: ${var.warehouse_id}

      evaluation:
        comparison_operator: "GREATER_THAN"
        source:
          name: "max_level"
          display: "max_level"
        threshold:
          value:
            double_value: 150.0
        notification:
          notify_on_ok: false
          subscriptions:
            - user_email: "${workspace.current_user.userName}"

      schedule:
        pause_status: "UNPAUSED"
        quartz_cron_schedule: "0 */30 * * * ?"
        timezone_id: "Europe/Paris"

      permissions:
        - level: CAN_RUN
          group_name: "users"
